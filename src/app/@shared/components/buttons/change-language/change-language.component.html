<app-action-button
  class="language-button"
  [matMenuTriggerFor]="languageMenu"
  [text]="currentLanguage()"
  icon="translate"
  type="basic"
/>

<mat-menu #languageMenu="matMenu">
  <button *ngFor="let lang of filteredSystemLanguages()" (click)="switchLanguage(lang)" mat-menu-item>
    {{ 'pages.layout.header.language.' + lang | translate }}
  </button>
</mat-menu>
