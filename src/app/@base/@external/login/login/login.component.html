<section class="auth-page">
  <div class="auth-card">
    <div class="brand-mark" aria-label="Fluentia English Academy">
      <span class="brand-mark__name fluentia-word">Fluentia</span>
      <span class="brand-mark__sub">English Academy</span>
    </div>

    <h1>Login</h1>
    <h2>Secure sign in to continue your <span class="fluentia-word">Fluentia</span> journey</h2>

    <form
      cdkTrapFocus
      [cdkTrapFocusAutoCapture]="true"
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      novalidate
    >
      <p>Email address</p>
      <mat-form-field>
        <input
          matInput
          cdkFocusInitial
          type="email"
          autocomplete="username"
          formControlName="email"
        />
        <mat-error>
          <app-form-errors [control]="form.controls.email" />
        </mat-error>
      </mat-form-field>

      <p class="mt-1">Password</p>
      <mat-form-field>
        <input
          formControlName="password"
          matInput
          [type]="hide() ? 'password' : 'text'"
          autocomplete="current-password"
        />
        <button
          type="button"
          mat-icon-button
          matSuffix
          (click)="onTogglePasswordClick($event)"
          [attr.aria-label]="'Toggle password visibility'"
          [attr.aria-pressed]="!hide()"
        >
          <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error>
          <app-form-errors [control]="form.controls.password" />
        </mat-error>
      </mat-form-field>

      <article class="auth-actions-row">
        <mat-checkbox formControlName="rememberMe">Remember me</mat-checkbox>
        <a routerLink="/external/reset-password">Reset password</a>
      </article>

      <app-action-button
        [text]="'Login'"
        type="flat"
        [isLoading]="_isLoading()"
        [disabled]="form.invalid || _isLoading()"
        [fullWidth]="true"
      />
    </form>

    <div class="guest-entry">
      <app-action-button
        (clicked)="continueAsGuest()"
        [text]="'Continue as guest'"
        type="stroked"
        color="primary"
        [fullWidth]="true"
      />
    </div>

    <div class="switch-auth">
      <span>New to <span class="fluentia-word">Fluentia</span>?</span>
      <a routerLink="/external/register">Create account</a>
    </div>
  </div>
</section>
