<section class="auth-page">
  <div class="auth-card">
    @if (isResetMode()) {
      <h1>Set New Password</h1>
      <h2>Use your secure reset link to set a new password</h2>

      <form [formGroup]="resetForm" novalidate>
        <p>New password</p>
        <realsoft-form-field>
          <input realsoftInput type="password" formControlName="password" autocomplete="new-password" />
          <realsoft-error>
            <app-form-errors [control]="resetForm.controls.password" />
          </realsoft-error>
        </realsoft-form-field>

        <p>Confirm new password</p>
        <realsoft-form-field>
          <input realsoftInput type="password" formControlName="confirmPassword" autocomplete="new-password" />
          <realsoft-error>
            <app-form-errors [control]="resetForm.controls.confirmPassword" />
          </realsoft-error>
        </realsoft-form-field>

        <app-action-button
          (click)="submitNewPassword()"
          [text]="'Reset Password'"
          type="flat"
          [isLoading]="_isLoading()"
          [disabled]="resetForm.invalid"
          [fullWidth]="true"
        />
      </form>
    } @else {
      <h1>Reset Password</h1>
      <p class="auth-static-notice" role="status" aria-live="polite">
        {{ forgotPasswordNotice }}
      </p>
    }

    <div class="switch-auth">
      <a routerLink="/external/login">Back to log in</a>
    </div>
  </div>
</section>
