<section class="auth-page">
  <div class="auth-card">
    @if (isResetMode()) {
      <h1>Set New Password</h1>
      <h2>Use your secure reset link to set a new password</h2>

      <form [formGroup]="resetForm" novalidate>
        <p>New password</p>
        <realsoft-form-field>
          <input realsoftInput type="password" formControlName="password" autocomplete="new-password" />
          <realsoft-error>
            <app-form-errors [control]="resetForm.controls.password" />
          </realsoft-error>
        </realsoft-form-field>

        <p>Confirm new password</p>
        <realsoft-form-field>
          <input realsoftInput type="password" formControlName="confirmPassword" autocomplete="new-password" />
          <realsoft-error>
            <app-form-errors [control]="resetForm.controls.confirmPassword" />
          </realsoft-error>
        </realsoft-form-field>

        <app-action-button
          (click)="submitNewPassword()"
          [text]="'Reset Password'"
          type="flat"
          [isLoading]="_isLoading()"
          [disabled]="resetForm.invalid"
          [fullWidth]="true"
        />
      </form>
    } @else {
      <h1>Reset Password</h1>
      <h2>Enter your email and we will send a reset link</h2>

      <form [formGroup]="forgotForm" novalidate>
        <p>Email address</p>
        <realsoft-form-field>
          <input realsoftInput type="email" formControlName="email" autocomplete="email" />
          <realsoft-error>
            <app-form-errors [control]="forgotForm.controls.email" />
          </realsoft-error>
        </realsoft-form-field>

        <app-action-button
          (click)="requestReset()"
          [text]="'Send Reset Link'"
          type="flat"
          [isLoading]="_isLoading()"
          [disabled]="forgotForm.invalid"
          [fullWidth]="true"
        />
      </form>
    }

    <div class="switch-auth">
      <a routerLink="/external/login">Back to login</a>
    </div>
  </div>
</section>
