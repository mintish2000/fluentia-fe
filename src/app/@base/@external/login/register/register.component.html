<section class="auth-page">
  <div class="auth-card">
    <h1>Create Account</h1>
    <h2>Register with <span class="fluentia-word">Fluentia</span> to start learning</h2>

    <form [formGroup]="form" novalidate>
      <p>First name</p>
      <mat-form-field>
        <input matInput type="text" formControlName="firstName" autocomplete="given-name" />
        <mat-error>
          <app-form-errors [control]="form.controls.firstName" />
        </mat-error>
      </mat-form-field>

      <p>Last name</p>
      <mat-form-field>
        <input matInput type="text" formControlName="lastName" autocomplete="family-name" />
        <mat-error>
          <app-form-errors [control]="form.controls.lastName" />
        </mat-error>
      </mat-form-field>

      <p>Email address</p>
      <mat-form-field>
        <input matInput type="email" formControlName="email" autocomplete="email" />
        <mat-error>
          <app-form-errors [control]="form.controls.email" />
        </mat-error>
      </mat-form-field>

      <p>Password</p>
      <mat-form-field>
        <input matInput type="password" formControlName="password" autocomplete="new-password" />
        <mat-error>
          <app-form-errors [control]="form.controls.password" />
        </mat-error>
      </mat-form-field>

      <p>Confirm password</p>
      <mat-form-field>
        <input matInput type="password" formControlName="confirmPassword" autocomplete="new-password" />
        <mat-error>
          <app-form-errors [control]="form.controls.confirmPassword" />
        </mat-error>
      </mat-form-field>

      <app-action-button
        (click)="register()"
        [text]="'Register'"
        type="flat"
        [isLoading]="_isLoading()"
        [disabled]="form.invalid"
        [fullWidth]="true"
      />
    </form>

    <div class="switch-auth">
      <span>Already have an account?</span>
      <a routerLink="/external/login">Back to log in</a>
    </div>
  </div>
</section>
